<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florida Vacation Swear Chart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="bubbles"></div>

  <header>
    <h1>Swear Jar</h1>
    <p class="subtitle">Florida Vacation Edition</p>
    <div id="sync-status" class="sync-status connecting"></div>
  </header>

  <section id="share-bar" class="hidden">
    <label>Share this link so everyone sees the same scores:</label>
    <div class="share-row">
      <input type="text" id="share-link" readonly>
      <button id="copy-btn">Copy</button>
    </div>
  </section>

  <main>
    <section id="scoreboard">
      <h2>The Standings</h2>
      <div id="player-cards"></div>
    </section>

    <section id="controls">
      <h2>Update Scores</h2>
      <div class="control-row">
        <label for="player-select">Who?</label>
        <select id="player-select"></select>
      </div>
      <div class="action-buttons">
        <button id="swear-btn" class="action-btn swear">
          <span class="btn-icon">🤬</span>
          <span>Swear! (+1)</span>
        </button>
        <button id="good-deed-btn" class="action-btn good-deed">
          <span class="btn-icon">😇</span>
          <span>Good Deed (-1)</span>
        </button>
      </div>
    </section>

    <section id="history-section">
      <h2>Recent Activity</h2>
      <ul id="history-log"></ul>
    </section>
  </main>

  <footer>
    <p>Florida Vacation 2026 &mdash; Keep it clean(ish)!</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
