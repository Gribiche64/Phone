<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florida Vacation Swear Chart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="bubbles"></div>

  <header>
    <h1>Swear Jar</h1>
    <p class="subtitle">Florida Vacation Edition</p>
    <span id="sync-status" class="sync-badge synced">Live</span>
  </header>

  <main>
    <section id="scoreboard">
      <h2>The Standings</h2>
      <div id="player-cards"></div>
    </section>

    <div id="reaction-toast" class="hidden"></div>

    <section id="controls">
      <h2>Who said it?</h2>
      <div class="control-row">
        <select id="player-select"></select>
      </div>
      <div class="action-buttons">
        <button id="swear-btn" class="action-btn swear">
          <span class="btn-icon">🤬</span>
          <span>Swear! (+1)</span>
        </button>
        <button id="good-deed-btn" class="action-btn good-deed">
          <span class="btn-icon">😇</span>
          <span>Good Deed (-1)</span>
        </button>
      </div>
    </section>

    <section id="history-section">
      <h2>Recent Activity</h2>
      <ul id="history-log"></ul>
    </section>
  </main>

  <footer>
    <p>Florida Vacation 2026 &mdash; Keep it clean(ish)!</p>
    <p class="footer-note">10 strikes and you're out!</p>
    <nav class="page-nav">
      <a href="bingo.html">🎰 Play Universal Bingo →</a>
    </nav>
  </footer>

  <script src="script.js"></script>
</body>
</html>
